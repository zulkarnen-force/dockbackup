# ── Example: Local + dual cloud providers ───────────────────────────
# Backups are kept locally AND uploaded to both R2 and Mega.

services:
  # ── Your database ──────────────────────────────────────────────────
  postgres:
    image: postgres:16
    restart: unless-stopped
    labels:
      - backup.enable=true
    environment:
      POSTGRES_DB: myapp
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data

  # ── Backup agent ──────────────────────────────────────────────────
  backup:
    image: zulkarnen/docker-db-backup:latest
    container_name: backup-agent
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backups:/backup
    environment:
      INTERVAL: 1h
      BACKUP_FORMAT: compress
      MAX_FILES: 14
      BACKUP_METHOD: both

      # Provider 1 — Cloudflare R2
      RCLONE_1_PROVIDER: r2
      RCLONE_1_NAME: cloudflare
      RCLONE_1_REMOTE_PATH: my-bucket/db-backups
      RCLONE_1_ACCESS_KEY_ID: "<r2-access-key>"
      RCLONE_1_SECRET_ACCESS_KEY: "<r2-secret-key>"
      RCLONE_1_ENDPOINT: "https://<account-id>.r2.cloudflarestorage.com"

      # Provider 2 — Mega
      RCLONE_2_PROVIDER: mega
      RCLONE_2_NAME: mega
      RCLONE_2_REMOTE_PATH: /backups/myserver
      RCLONE_2_USER: "user@example.com"
      RCLONE_2_PASS: "your-mega-password"

volumes:
  pgdata:
