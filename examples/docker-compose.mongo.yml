# ── Example: MongoDB local backup ────────────────────────────────────
# Backs up a MongoDB container to a local volume.
# The agent uses its own mongodump binary and connects via the container's
# Docker network IP (works with MongoDB 6.0+ which no longer ships mongodump).

services:
  # ── Your database ──────────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    labels:
      - backup.enable=true
    environment:
      MONGO_INITDB_DATABASE: myapp
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
    volumes:
      - mongodata:/data/db

  # ── Backup agent ──────────────────────────────────────────────────
  backup:
    image: zulkarnen/docker-db-backup:latest
    container_name: backup-agent
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backups:/backup
    environment:
      INTERVAL: 1h
      BACKUP_FORMAT: compress # uses mongodump --archive --gzip
      MAX_FILES: 7

volumes:
  mongodata:
